## ESP Component Manager — managed dependency manifest
##
## Changes from original:
##   + espressif/esp-dsp  : FFT engine (dsps_fft2r_fc32, window functions)
##   + espressif/mdns     : mDNS service advertisement for web UI discovery
##
## Note: WiFi on ESP32-P4 routes through a companion ESP32-C5 chip via SDIO.
## The esp_wifi_remote + esp_hosted components are needed for Phase 2 (web
## interface). They are commented out here because they require companion
## firmware that must be provisioned separately; uncomment when ready.
##
## Note: espressif/es8311 IS used (audio_source component) for codec init.
## It uses i2c_master_write_to_device/i2c_master_write_read_device from the
## legacy driver/i2c.h API, so it's fully compatible with the BSP's legacy
## I2C driver shared with the touch controller — no new i2c_master bus
## needed. A prior hand-rolled register-write implementation mismapped
## several ES8311 registers and left the ADC path effectively dead.
##
dependencies:
  espressif/esp32_p4_function_ev_board:
    version: "^3"

  ## Pin esp_lvgl_port to 2.4.x — avoids assert(dsi_cfg != NULL) incompatibility
  ## with BSP 3.0.1 that is fixed in 2.4.0 but broken again in 3.x.
  espressif/esp_lvgl_port:
    version: "~2.4.0"

  ## FFT library — provides dsps_fft2r_fc32 (radix-2 complex FFT, float32).
  ## Supports power-of-two sizes from 16 to 16384 with PSRAM coefficient tables.
  espressif/esp-dsp:
    version: "^1"

  ## mDNS — Phase 2, but declared here so the component manager resolves it
  ## before the web_server component is added.
  espressif/mdns:
    version: "^1"

  ## Phase 2 M3: WiFi via the on-board ESP32-C6 companion chip (SDIO).
  ## The C6 ships pre-flashed with the ESP-Hosted slave firmware; the
  ## esp_wifi_remote component proxies the standard esp_wifi API to it.
  espressif/esp_wifi_remote:
    version: "1.6.1"
  espressif/esp_hosted:
    version: "2.12.9"

  ## Official ES8311 codec driver — see note above.
  espressif/es8311:
    version: "^1"

  ## USB Audio Class 1.0 host driver — UAC1 measurement microphones
  ## (miniDSP UMIK-1 and generic UAC1 mics), Phase 2 M1.
  espressif/usb_host_uac:
    version: "^1"

  ## Camera capture + QR decoding for on-device Wi-Fi provisioning.
  espressif/esp_video:
    version: "1.4.1"
  espressif/quirc:
    version: "^1.2.0"
