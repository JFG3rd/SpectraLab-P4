; PlatformIO Project Configuration File
;
; ESP32-P4 Function EV Board (V1.5.2)
; Using ESP-IDF framework (required for MIPI DSI display, touch, camera, audio)
;
; https://docs.platformio.org/page/projectconf.html

[env:esp32-p4-evboard]
platform = espressif32
board = esp32-p4-evboard
framework = espidf
monitor_speed = 115200

; Upload via USB-CDC serial (esptool).  If the port auto-detection fails with
; "port is busy or doesn't exist", the most common causes are:
;   1. Serial monitor is still open — close it (Ctrl+C in PIO terminal) before uploading.
;   2. Port name changed after replug — find it with: ls /dev/cu.*  (macOS)
;      or: ls /dev/ttyUSB* /dev/ttyACM*  (Linux)
;      then uncomment upload_port below and set the correct value.
;
; upload_port = /dev/cu.usbmodem101   ; uncomment and adjust if auto-detect fails

build_flags =
    -D CONFIG_ESP32_P4_EVBOARD
    -D CONFIG_ESP32_P4_EVBOARD_V152
    -D CONFIG_ESP32_P4_EVBOARD_V152_ESP_IDF
