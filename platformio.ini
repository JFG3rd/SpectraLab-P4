; PlatformIO Project Configuration File
;
; ESP32-P4 Function EV Board (V1.5.2)
; Using ESP-IDF framework (required for MIPI DSI display, touch, camera, audio)
;
; https://docs.platformio.org/page/projectconf.html

[env:esp32-p4-evboard]
platform = espressif32
board = esp32-p4-evboard
framework = espidf
monitor_speed = 115200

; Upload via built-in USB JTAG (most reliable — no serial port selection needed).
; The ESP32-P4 exposes a USB JTAG interface on the same USB-C connector used for
; serial monitoring. OpenOCD connects to it directly via libusb, so there is no
; CDC-ACM port race condition when the chip resets during flashing.
upload_protocol = esp-builtin
debug_tool = esp-builtin

; ── Fallback: esptool via USB-CDC serial ───────────────────────────────────────
; If esp-builtin does not work (e.g. libusb driver not installed on macOS), use
; esptool instead.  Find the correct port first:
;   macOS:  ls /dev/cu.*          (look for cu.usbmodem*)
;   Linux:  ls /dev/ttyUSB*       (look for ttyUSB0 or ttyACM0)
; Then uncomment the three lines below and comment out the two lines above.
;
; upload_protocol = esptool
; upload_port = /dev/cu.usbmodem101   ; <-- replace with your actual port
; upload_speed = 460800               ; lower speed reduces flashing errors

build_flags =
    -D CONFIG_ESP32_P4_EVBOARD
    -D CONFIG_ESP32_P4_EVBOARD_V152
    -D CONFIG_ESP32_P4_EVBOARD_V152_ESP_IDF
