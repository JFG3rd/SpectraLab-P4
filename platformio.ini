; PlatformIO Project Configuration File
;
; ESP32-P4 Function EV Board (V1.5.2)
; Using ESP-IDF framework (required for MIPI DSI display, touch, camera, audio)
;
; https://docs.platformio.org/page/projectconf.html

[env:esp32-p4-evboard]
platform = espressif32
board = esp32-p4-evboard
framework = espidf
monitor_speed = 115200

; Upload via USB-CDC serial (esptool).
; The ESP32-P4 has no separate UART bridge — USB-C goes directly to the ESP32-P4
; USB-OTG peripheral (VID:PID 303A:1001).  macOS assigns a new usbmodem port
; number each time the board resets or reconnects, so a glob pattern is used
; instead of a fixed name.  If upload still fails, close the serial monitor first
; (it holds the port busy), then enter bootloader mode: hold BOOT → press RST →
; release BOOT, then run the upload task.
upload_port = /dev/cu.usbmodem*

build_flags =
    -D CONFIG_ESP32_P4_EVBOARD
    -D CONFIG_ESP32_P4_EVBOARD_V152
    -D CONFIG_ESP32_P4_EVBOARD_V152_ESP_IDF
