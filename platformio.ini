; PlatformIO Project Configuration File
;
; ESP32-P4 Function EV Board (V1.5.2)
; Using ESP-IDF framework (required for MIPI DSI display, touch, camera, audio)
;
; https://docs.platformio.org/page/projectconf.html

[env:esp32-p4-evboard]
platform = espressif32
board = esp32-p4-evboard
framework = espidf
monitor_speed = 115200

; Upload and debug via the ESP32-P4 built-in USB JTAG controller.
;
; The device shows up as VID:PID=303A:1001 "USB JTAG/serial debug unit".
; This is a HARDWARE peripheral — it is always enumerated by the ROM regardless
; of whether the application firmware is running, crashed, or absent.  OpenOCD
; connects to it by VID:PID, so:
;   • No serial port name needed (no /dev/cu.usbmodem* timing issues)
;   • No BOOT+RST button sequence required
;   • Works even when the firmware crashes before USB-CDC initialises
;
; Serial monitor (platformio device monitor) still uses the CDC-ACM interface
; on the same USB-C connector — port auto-detected as /dev/cu.usbmodem*
upload_protocol = esp-builtin
debug_tool     = esp-builtin

build_flags =
    -D CONFIG_ESP32_P4_EVBOARD
    -D CONFIG_ESP32_P4_EVBOARD_V152
    -D CONFIG_ESP32_P4_EVBOARD_V152_ESP_IDF
