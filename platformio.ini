; PlatformIO Project Configuration File
;
; Two build environments, one per board silicon revision:
;   esp32-p4-evboard  — ESP32-P4-Function-EV-Board v1.5.2 (P4 chip rev v1.x)
;   esp32-p4x-evboard — ESP32-P4X-Function-EV-Board v1.6  (P4 chip rev v3.x)
;
; The boards are peripheral-identical (same LCD/ES8311/C6/SD); they differ
; only in P4 silicon revision. Rev 3.x is a BREAKING major revision: one
; binary cannot run on both, so each env has its own sdkconfig.<env> and
; tools/check_chip_rev.py refuses to flash a binary onto the wrong silicon.
;
;   pio run                              # build both
;   pio run -e esp32-p4-evboard -t upload    # flash the v1.5.2 board
;   pio run -e esp32-p4x-evboard -t upload   # flash the P4X v1.6 board
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
; pioarduino release 55.03.39 = ESP-IDF v5.5.4. Chip rev 3.x (P4X boards)
; requires IDF >= 5.5.3; do not downgrade below 55.03.38.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-p4-evboard
framework = espidf
; OTA partition layout (ota_0/ota_1 6 MB + spiffs). Without this line
; PlatformIO silently uses the default 1 MB factory table (the IDF
; CONFIG_PARTITION_TABLE_CUSTOM setting alone is not honored).
board_build.partitions = partitions.csv
monitor_speed = 115200
upload_protocol = esp-builtin
debug_tool = esp-builtin
; fix_openocd_upload.py works around an espressif32 platform bug in the
; OpenOCD upload command (program_esp paths get wrapped in double Tcl
; braces, which OpenOCD then fails to open).
; check_chip_rev.py aborts an upload if the connected chip's silicon major
; revision does not match this env's custom_p4_rev_major.
extra_scripts = pre:tools/fix_openocd_upload.py
	pre:tools/generate_esp_ipa_config.py
	pre:tools/check_chip_rev.py

[env:esp32-p4-evboard]
; Original board: P4 silicon rev v1.x (360 MHz).
custom_p4_rev_major = 1
build_flags =
	-D CONFIG_ESP32_P4_EVBOARD
	-D CONFIG_ESP32_P4_EVBOARD_V152
	-D CONFIG_ESP32_P4_EVBOARD_V152_ESP_IDF

[env:esp32-p4x-evboard]
; ESP32-P4X-Function-EV-Board v1.6: P4 silicon rev v3.x (ECO7).
; The _r3 board manifest sets chip_variant=esp32p4 (vs esp32p4_es), which
; makes the builder pick the rev-3 linker scripts (sections.rev3.ld.in) —
; with the plain board the link fails on missing sram_low/sram_high regions.
board = esp32-p4_r3-evboard
custom_p4_rev_major = 3
; OpenOCD (esp-builtin) writes corrupt data on rev-3 silicon as of
; openocd 20260424 (ROM then boot-loops with "Checksum failure") —
; upload over serial download mode instead. JTAG debugging still works.
upload_protocol = esptool
build_flags =
	-D CONFIG_ESP32_P4_EVBOARD
	-D CONFIG_ESP32_P4X_EVBOARD_V16
