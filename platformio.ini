; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-p4-evboard]
platform = espressif32
board = esp32-p4-evboard
framework = espidf
monitor_speed = 115200
upload_protocol = esp-builtin
debug_tool = esp-builtin
; Works around an espressif32 platform bug in the OpenOCD upload command
; (program_esp paths get wrapped in double Tcl braces, which OpenOCD then
; fails to open). See tools/fix_openocd_upload.py.
extra_scripts = pre:tools/fix_openocd_upload.py
build_flags = 
	-D CONFIG_ESP32_P4_EVBOARD
	-D CONFIG_ESP32_P4_EVBOARD_V152
	-D CONFIG_ESP32_P4_EVBOARD_V152_ESP_IDF
